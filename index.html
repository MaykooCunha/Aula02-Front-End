<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Primeira App Interativa</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Aula Mestra: Web Dev</h1>
    </header>

    <main>
        <p>Digita uma tarefa ou termo de busca:</p>
        
        <div class="input-group">
            <input type="text" id="input-usuario" placeholder="Escreve aqui...">
            <button id="btn-acao">Executar Ação</button>
        </div>

        <section id="exibicao">
            <h2>Resultados em tempo real:</h2>
            <ul id="lista-dinamica">
                <li>Aguardando interação...</li>
            </ul>
        </section>
    </main>

    <footer>
        <p>© 2026 - Criado na Aula de Revisão Front-End</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
